<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="serverless, adminless, decentralized reddit alternative" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Seedit</title>
    <!-- React Grab: Hold ⌘C and click any element to provide visual context to AI coding agents (dev only) -->
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
    <script>
      // Redirect non-hash URLs to hash URLs on initial load
      // Skip redirect for file:// protocol (Electron) or if pathname ends with index.html
      if (
        window.location.protocol !== 'file:' &&
        window.location.pathname &&
        window.location.pathname !== '/' &&
        !window.location.pathname.endsWith('/index.html') &&
        !window.location.hash
      ) {
        window.location.replace('/#' + window.location.pathname + window.location.search);
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
